name: code checks
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
      - dia-code
    paths:
      - .pre-commit-config.yaml
      - .github/workflows/**
      - .gitignore
      - codecov.yml
      - scripts/**
      - src/**
      - tests/**
      - uv.lock
      - pyproject.toml
      - '**.ipynb'
  pull_request:
    branches:
      - main
      - dia-code
    paths:
      - .pre-commit-config.yaml
      - .github/workflows/**
      - .gitignore
      - codecov.yml
      - scripts/**
      - src/**
      - tests/**
      - uv.lock
      - pyproject.toml
      - '**.ipynb'
  workflow_dispatch:

jobs:
  run-code-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.9.11"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run pre-commit
        run: |
          source .venv/bin/activate
          pre-commit run --all-files

      - name: pip-audit (gh-action-pip-audit)
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          virtual-environment: .venv/
          ignore-vulns: |
            GHSA-4xh5-x5gv-qwph
